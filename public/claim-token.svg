<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6C2BD9"/>
      <stop offset="40%" stop-color="#8B5CF6"/>
      <stop offset="70%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#C4B5FD"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="0.45" cy="0.45" r="0.4">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="flare" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="14" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="#06060C"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="url(#ringGrad)" stroke-width="8" filter="url(#glow)"/>
  <!-- Inner fill -->
  <circle cx="256" cy="256" r="218" fill="#0A0A16"/>
  <!-- Inner glow -->
  <circle cx="256" cy="256" r="218" fill="url(#innerGlow)"/>
  <!-- Decorative rings -->
  <circle cx="256" cy="256" r="198" fill="none" stroke="url(#ringGrad)" stroke-width="2.5" opacity="0.2"/>
  <circle cx="256" cy="256" r="185" fill="none" stroke="url(#ringGrad)" stroke-width="1" opacity="0.08"/>
  <!-- C Gem (scaled 2.6x from 100-space, offset to center) -->
  <!-- Center of gem in 100-space: ~(42,50). Target: (256,256). offset_x=256-42*2.6=146.8, offset_y=256-50*2.6=126 -->
  <g filter="url(#glow)">
    <!-- Upper facet -->
    <polygon points="350,165 225,142 162,256 209,256 240,188 303,209" fill="#A78BFA" opacity="0.9"/>
    <!-- Lower facet -->
    <polygon points="162,256 225,370 350,347 303,303 240,324 209,256" fill="#6C2BD9" opacity="0.85"/>
    <!-- Inner face -->
    <polygon points="303,209 240,188 209,256 240,324 303,303" fill="#8B5CF6" opacity="0.75"/>
  </g>
  <!-- Inner white highlights -->
  <line x1="350" y1="165" x2="225" y2="142" stroke="#FFFFFF" stroke-width="1.5" opacity="0.10"/>
  <line x1="350" y1="165" x2="303" y2="209" stroke="#FFFFFF" stroke-width="1" opacity="0.08"/>
  <!-- Apex flare -->
  <circle cx="350" cy="165" r="5" fill="#FFFFFF" opacity="0.35" filter="url(#flare)"/>
  <circle cx="350" cy="165" r="12" fill="#C4B5FD" opacity="0.10" filter="url(#flare)"/>
  <!-- Shimmer -->
  <ellipse cx="230" cy="210" rx="25" ry="8" fill="#FFFFFF" opacity="0.02" transform="rotate(-20, 230, 210)"/>
</svg>